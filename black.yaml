# フォント設定
fonts:
  # システムにインストールされているフォント名、またはパスを指定
  bold: ["Montserrat-Bold.ttf"]
  regular: ["Montserrat-Regular.ttf"]
  
  # サイズ指定のタイプ ("px" または "ratio")
  size_type: "px"
  # px指定ならピクセル数、ratio指定なら長辺に対する割合（例: 0.02）
  main_size: 90
  sub_size: 70

# 色設定 (HEX形式)
colors:
  bg: "#222222"
  main: "#ffffff"
  sub: "#eeeeee"

# 余白設定（画像長辺に対する割合）
ratios:
  bottom_margin: 0.090
  side_margin: 0.010

# レイアウトテンプレート
# {変数名} の部分はメタデータから自動置換されます
layout:
  top: "{camera}   {lens}"
  bottom: "{focal_length}mm  |  f{f_number}  {shutter}  ISO {iso}  |  {exposure_bias}EV  |  {exposure_mode}  |  {picture_control}"
  # 行間のピクセル数 (size_typeに関わらずpxで指定すると微調整しやすいです)
  line_spacing_px: 150
  # 下部余白内での開始位置（0.0〜1.0）
  top_padding_ratio: 0.25

# 出力設定
output:
  prefix: "Frame_"
  dir_name: "processed_photos_black"
  quality: 100